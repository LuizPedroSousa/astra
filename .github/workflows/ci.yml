name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build Engine
    runs-on: ubuntu-latest
    env:
      VCPKG_INSTALL_ROOT: ${{ github.workspace }}/vcpkg_installed
      VCPKG_BINARY_SOURCES: clear;x-gha,readwrite

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ninja-build \
            libgl-dev \
            libopengl-dev \
            libvulkan-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxext-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libassimp-dev

      - name: Restore vcpkg cache
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: |
            vcpkg_installed
          key: ${{ runner.os }}-x64-linux-vcpkg-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}
          restore-keys: |
            ${{ runner.os }}-x64-linux-vcpkg-

      - name: Setup vcpkg
        run: |
          if [ ! -d vcpkg/.git ]; then
            git clone https://github.com/microsoft/vcpkg.git
          fi
          ./vcpkg/bootstrap-vcpkg.sh -disableMetrics

      - name: Enable vcpkg binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install vcpkg packages
        run: ./vcpkg/vcpkg install --triplet x64-linux --x-feature=dev --x-install-root="${VCPKG_INSTALL_ROOT}"

      - name: Configure
        run: cmake --preset=debug -DASTRALIX_STREAMS_FORMATS=Json -DVCPKG_MANIFEST_INSTALL=OFF
        env:
          CMAKE_TOOLCHAIN_FILE: ${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake

      - name: Build axgen
        run: cmake --build builds/debug --target axgen -j$(nproc)

      - name: Generate engine shader bindings
        run: builds/debug/axgen/axgen sync-shaders --manifest examples/sandbox/src/project.ax

      - name: Build
        run: cmake --build builds/debug -j$(nproc)

      - name: Configure tests
        run: |
          cmake -S tests -B builds/tests \
            -G Ninja \
            -DCMAKE_CXX_STANDARD=20

      - name: Build tests
        run: cmake --build builds/tests -j$(nproc)

      - name: Upload test build artifact
        uses: actions/upload-artifact@v4
        with:
          name: tests-build-linux-x64
          path: |
            builds/tests
            vcpkg_installed
          if-no-files-found: error

  test:
    name: Run Tests
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download test build artifact
        uses: actions/download-artifact@v4
        with:
          name: tests-build-linux-x64
          path: .

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y spirv-tools libassimp-dev

      - name: Add permission to test binary
        run: chmod +x builds/tests/astralix_tests

      - name: Run tests
        run: ctest --test-dir builds/tests --verbose --output-on-failure
